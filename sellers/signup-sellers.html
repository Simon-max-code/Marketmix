<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Login | MarketMix</title>
  <link rel="stylesheet" href="sellers login.css">
  <link rel="stylesheet" href="../shared/notifications.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Toast fallback in case notifications.css isn't loaded */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      color: #fff;
      font-weight: 600;
      z-index: 9999;
      animation: slideIn 0.3s ease;
      max-width: 360px;
    }
    .toast.success { background: #4CAF50; }
    .toast.error   { background: #f44336; }
    .toast.info    { background: #2196F3; }
    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.82rem;
      text-align: left;
      margin-top: 4px;
      display: none;
    }
    input.input-error {
      box-shadow: 0 0 0 2px #ff6b6b !important;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div style="text-align:center; margin-bottom:12px;">
        <img src="images/logo Picture1.png" alt="MarketMix Logo" style="width:120px; height:auto;">
      </div>
      <h1>Login to your account</h1>
      <p class="subtitle">Sign in to manage your seller account</p>

      <form id="sellerLoginForm" novalidate>
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@yourshop.com" required>
        <div class="error-msg" id="error-email"></div>

        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="Enter password" required style="padding-right:40px;">
          <span id="togglePassword" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#ccc; font-size:1.1rem;" onclick="togglePassword()">👁</span>
        </div>
        <div class="error-msg" id="error-password"></div>

        <a href="forgot-password.html" style="display:block; text-align:right; margin-top:8px; color:#667eea; text-decoration:none; font-size:0.9rem;">Forgot password?</a>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <p class="note">Or continue with</p>

      <button type="button" id="googleSigninBtn" onclick="handleGoogleSignin()" style="width:100%; padding:0.75rem; background:white; color:#333; border:1px solid #ddd; border-radius:6px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all 0.3s; font-size:1rem; margin-top:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <p class="note">Don't have an account? <a href="signup-sellers.html">Sign up</a></p>
    </div>
  </div>

  <script>
    const API_BASE = 'https://marketmix-backend.onrender.com/api';

    // ─── Toast ────────────────────────────────────────────────────────────────
    function showToast(message, type = 'info') {
      if (typeof showNotification === 'function') {
        showNotification(message, type);
        return;
      }
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // ─── Password toggle ──────────────────────────────────────────────────────
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('togglePassword');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👁';
      }
    }

    // ─── Field validation ─────────────────────────────────────────────────────
    function showError(fieldId, message) {
      const el = document.getElementById('error-' + fieldId);
      const input = document.getElementById(fieldId);
      if (el) { el.textContent = message; el.style.display = 'block'; }
      if (input) input.classList.add('input-error');
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
      });
      document.querySelectorAll('.input-error').forEach(el => {
        el.classList.remove('input-error');
      });
    }

    // ─── Save session ─────────────────────────────────────────────────────────
    function saveSession(token, user) {
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
    }

    // ─── Redirect after login ─────────────────────────────────────────────────
    function redirectToDashboard() {
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'sellers layout.html';
      }, 1500);
    }

    // ─── Email/Password login ─────────────────────────────────────────────────
    document.getElementById('sellerLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');

      // Client-side validation
      let valid = true;
      if (!email) {
        showError('email', 'Email is required');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('email', 'Enter a valid email address');
        valid = false;
      }
      if (!password) {
        showError('password', 'Password is required');
        valid = false;
      }
      if (!valid) return;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const res  = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          // Surface the exact backend message
          const msg = data.message || 'Login failed. Please try again.';

          // Friendly message for Google-only accounts
          if (msg.includes('Google Sign-In')) {
            showToast('This account uses Google Sign-In. Use the button below.', 'error');
          } else {
            showToast(msg, 'error');
          }

          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }

        const user  = data.data?.user  || data.user;
        const token = data.data?.token || data.token;

        // Role check — only sellers should access this dashboard
        if (user.role !== 'seller') {
          showToast('This portal is for sellers only. Please use the buyer login.', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }

        saveSession(token, user);
        redirectToDashboard();

      } catch (err) {
        console.error('Login error:', err);
        showToast('Network error. Please check your connection.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });

    // ─── Google Sign-In ───────────────────────────────────────────────────────
    window.onload = function () {
      if (typeof google !== 'undefined') {
        google.accounts.id.initialize({
          client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
          callback: handleCredentialResponse
        });
      }
    };

    function handleGoogleSignin() {
      if (typeof google === 'undefined') {
        showToast('Google Sign-In is not available right now.', 'error');
        return;
      }
      google.accounts.id.prompt((notification) => {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          showToast('Google prompt unavailable. Try again or use email login.', 'info');
        }
      });
    }

    async function handleCredentialResponse(response) {
      const googleBtn = document.getElementById('googleSigninBtn');
      googleBtn.disabled = true;
      googleBtn.textContent = 'Signing in...';

      try {
        // Decode the Google JWT to get user info
        const payload = JSON.parse(atob(response.credential.split('.')[1]));

        const res = await fetch(`${API_BASE}/auth/google-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    payload.email,
            googleId: payload.sub,
          })
        });

        const data = await res.json();

        if (!res.ok) {
          // If user doesn't exist yet, send them to signup
          if (res.status === 401) {
            showToast('No account found. Redirecting to sign up...', 'info');
            setTimeout(() => window.location.href = 'signup-sellers.html', 2000);
          } else {
            showToast(data.message || 'Google login failed.', 'error');
          }
          googleBtn.disabled = false;
          googleBtn.textContent = 'Sign in with Google';
          return;
        }

        const user  = data.data?.user  || data.user;
        const token = data.data?.token || data.token;

        // Role check
        if (user.role !== 'seller') {
          showToast('This portal is for sellers only.', 'error');
          googleBtn.disabled = false;
          googleBtn.textContent = 'Sign in with Google';
          return;
        }

        saveSession(token, user);
        redirectToDashboard();

      } catch (err) {
        console.error('Google login error:', err);
        showToast('Google login failed. Please try again.', 'error');
        googleBtn.disabled = false;
        googleBtn.textContent = 'Sign in with Google';
      }
    }
  </script>
</body>
</html>
