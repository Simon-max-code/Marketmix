<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Signup</title>
  <link rel="stylesheet" href="../shared/notifications.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: url('your-image.jpg') no-repeat center/cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .signup-container {
      width: 100%;
      max-width: 480px;
      background: rgba(0, 0, 0, 0.6);
      padding: 2rem;
      border-radius: 1rem;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .signup-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      color: #ffffff;
    }

    .progressbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      counter-reset: step;
    }

    .progressbar li {
      list-style: none;
      position: relative;
      flex: 1;
      text-align: center;
      color: #aaa;
    }

    .progressbar li::before {
      counter-increment: step;
      content: counter(step);
      width: 30px;
      height: 30px;
      line-height: 30px;
      border: 2px solid #aaa;
      display: block;
      text-align: center;
      margin: 0 auto 10px;
      border-radius: 50%;
      background: transparent;
    }

    .progressbar li.active::before {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .progressbar li.active {
      color: #fff;
    }

    .form-step {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .form-step.active {
      display: block;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    .input-group {
      margin-bottom: 1rem;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.6rem;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    .input-group input:focus,
    .input-group select:focus {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 2px #667eea;
    }

    .input-group input::placeholder {
      color: #ccc;
    }

    select option {
      background: #1e1e1e;
      color: #fff;
    }

    .error {
      font-size: 0.8rem;
      color: #ff6b6b;
      margin-top: 0.3rem;
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: transform 0.2s, background 0.3s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-google {
      background: #fff;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #ccc;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .password-group {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2rem;
      color: #ccc;
      user-select: none;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #fff;
    }

    .strength-bar {
      height: 6px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      margin-top: 5px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    /* Toast notification styles (in case shared/notifications.css isn't loaded) */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      color: #fff;
      font-weight: 600;
      z-index: 9999;
      animation: slideIn 0.3s ease;
      max-width: 360px;
    }

    .btn-back {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}
.btn-back:hover {
  background: rgba(255, 255, 255, 0.25);
}

    .toast.success { background: #4CAF50; }
    .toast.error   { background: #f44336; }
    .toast.info    { background: #2196F3; }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Seller Signup</h2>

    <ul class="progressbar">
      <li class="active">Step 1</li>
      <li>Step 2</li>
      <li>Step 3</li>
    </ul>

    <form id="signupForm">
      <!-- Step 1: Personal Info -->
      <div class="form-step active">
        <div class="input-group">
          <input type="text" id="fullname" placeholder="Full Name" required>
          <div class="error" id="error-fullname"></div>
        </div>
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" required>
          <div class="error" id="error-email"></div>
        </div>
        <div class="input-group">
          <input type="tel" id="phone" placeholder="Phone Number" required>
          <div class="error" id="error-phone"></div>
        </div>
        <button type="button" class="btn btn-primary next-btn">Next</button>
      </div>

      <!-- Step 2: Store Info -->
      <div class="form-step">
        <div class="input-group">
          <input type="text" id="storeName" placeholder="Store Name" required>
          <div class="error" id="error-storeName"></div>
        </div>
        <div class="input-group">
          <select id="businessType" required>
            <option value="">Select Business Type</option>
            <option value="retail">Retail</option>
            <option value="wholesale">Wholesale</option>
            <option value="service">Service</option>
          </select>
          <div class="error" id="error-businessType"></div>
        </div>
        <div class="input-group">
          <select id="productCategory" required>
            <option value="">Select Product Category</option>
            <option value="fashion">Fashion</option>
            <option value="electronics">Electronics</option>
            <option value="home">Home & Living</option>
            <option value="other">Other</option>
          </select>
          <div class="error" id="error-productCategory"></div>
        </div>
        <div class="input-group">
          <input type="text" id="address" placeholder="Business Address" required>
          <div class="error" id="error-address"></div>
        </div>
        <button type="button" class="btn btn-back prev-btn">Back</button>
        <button type="button" class="btn btn-primary next-btn">Next</button>
      </div>

      <!-- Step 3: Password -->
      <div class="form-step">
        <div class="input-group password-group">
          <input type="password" id="password" placeholder="Password (min 6 chars)" required>
          <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
          <div class="strength-bar"><div id="strength-bar-fill" class="strength-bar-fill"></div></div>
          <div class="error" id="error-password"></div>
        </div>
        <div class="input-group password-group">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
          <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
          <div class="error" id="error-confirmPassword"></div>
        </div>
        <button type="button" class="btn btn-back prev-btn">Back</button>
        <button type="submit" id="submitBtn" class="btn btn-primary">Create Account</button>
      </div>
    </form>

    <div class="divider">or</div>
    <button class="btn btn-google" onclick="handleGoogleSignup()">
      <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google Logo"> Sign up with Google
    </button>
    <p style="text-align:center; margin-top:1rem; color:#ccc;">
      Already have an account?
      <a href="sellers login.html" style="color:#667eea; font-weight:600; text-decoration:none;">Log in</a>
    </p>
  </div>

  <script>
    // ─── Config ────────────────────────────────────────────────────────────────
    const API_BASE = 'https://marketmix-backend.onrender.com/api';

    // ─── Toast Notification ────────────────────────────────────────────────────
    function showToast(message, type = 'info') {
      // Try shared showNotification if available, else fallback
      if (typeof showNotification === 'function') {
        showNotification(message, type);
        return;
      }
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // ─── Multi-step form logic ─────────────────────────────────────────────────
    const formSteps   = document.querySelectorAll('.form-step');
    const nextBtns    = document.querySelectorAll('.next-btn');
    const progressbar = document.querySelectorAll('.progressbar li');
    let currentStep   = 0;

    function showStep(step) {
      formSteps.forEach((div, i) => {
        div.classList.toggle('active', i === step);
        progressbar[i].classList.toggle('active', i <= step);
      });
    }
function validateStep(step) {
  let isValid = true;
  const inputs = formSteps[step].querySelectorAll("input, select");

  inputs.forEach(input => {
    const errorDiv = document.getElementById("error-" + input.id);
    if (!errorDiv) return;

    // Reset error first
    errorDiv.textContent = "";

    if (!input.value.trim()) {
      errorDiv.textContent = "This field is required";
      isValid = false;
    } else {
      if (input.type === "email") {
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) {
          errorDiv.textContent = "Enter a valid email";
          isValid = false;
        }
      }

      if (input.id === "phone") {
        if (!/^\+?\d{11}$/.test(input.value)) {
          errorDiv.textContent = "Phone number must be exactly 11 digits";
          isValid = false;
        }
      }

      if (input.id === "password" && input.value.length < 6) {
        errorDiv.textContent = "Password must be at least 6 characters";
        isValid = false;
      }

      if (input.id === "confirmPassword") {
        if (input.value !== document.getElementById("password").value) {
          errorDiv.textContent = "Passwords do not match";
          isValid = false;
        }
      }
    }
  });

  if (!isValid) {
    formSteps[step].classList.add("shake");
    setTimeout(() => formSteps[step].classList.remove("shake"), 300);
  }

  return isValid;
}


    nextBtns.forEach(() => {
      // We add one listener per button via index
    });
    
    const prevBtns = document.querySelectorAll(".prev-btn");
prevBtns.forEach((btn) => {
  btn.addEventListener("click", () => {
    if (currentStep > 0) {
      currentStep--;
      showStep(currentStep);
    }
  });
});

    document.querySelectorAll('.next-btn').forEach((btn, index) => {
      btn.addEventListener('click', () => {
        if (validateStep(currentStep)) {
          currentStep++;
          showStep(currentStep);
        }
      });
    });

    // ─── Form Submit: Register + Setup Profile ─────────────────────────────────
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validateStep(currentStep)) return;

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      const fullname       = document.getElementById('fullname').value.trim();
      const email          = document.getElementById('email').value.trim();
      const phone          = document.getElementById('phone').value.trim();
      const storeName      = document.getElementById('storeName').value.trim();
      const businessType   = document.getElementById('businessType').value;
      const productCategory = document.getElementById('productCategory').value;
      const address        = document.getElementById('address').value.trim();
      const password       = document.getElementById('password').value;

      try {
        // ── Step 1: Register the user with role=seller ──────────────────────
        const registerRes = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fullName: fullname,
            email,
            phone,
            password,
            role: 'seller'
          })
        });

        const registerData = await registerRes.json();

        if (!registerRes.ok) {
          const msg = registerData.message || 'Registration failed. Please try again.';
          showToast(msg, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        const token = registerData.data?.token || registerData.token;
        if (!token) {
          showToast('Registration succeeded but no token returned. Please log in.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        // Persist token for subsequent pages
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(registerData.data?.user || {}));

        // ── Step 2: Save seller store profile ──────────────────────────────
        submitBtn.textContent = 'Setting up store...';

        const profileRes = await fetch(`${API_BASE}/seller/setup-profile`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ storeName, businessType, productCategory, address })
        });

        const profileData = await profileRes.json();

        if (!profileRes.ok) {
          // Registration succeeded — warn but don't block
          console.warn('Store profile setup failed:', profileData.message);
          showToast('Account created! Store details can be updated in your dashboard.', 'info');
        } else {
          showToast('Account created successfully! Welcome aboard 🚀', 'success');
        }

        // ── Redirect to store setup / dashboard ────────────────────────────
        setTimeout(() => {
          window.location.href = 'setup-store.html';
        }, 2000);

      } catch (err) {
        console.error('Signup error:', err);
        showToast('Network error. Please check your connection and try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });

    // ─── Google Signup (placeholder — wire up your OAuth flow here) ───────────
    function handleGoogleSignup() {
      showToast('Google signup coming soon!', 'info');
      // TODO: implement Google OAuth → POST /api/auth/google-register with role:'seller'
    }

    // ─── Password helpers ──────────────────────────────────────────────────────
    function togglePassword(fieldId, el) {
      const input = document.getElementById(fieldId);
      if (input.type === 'password') {
        input.type = 'text';
        el.textContent = '🙈';
      } else {
        input.type = 'password';
        el.textContent = '👁';
      }
    }

    const passwordInput    = document.getElementById('password');
    const strengthBarFill  = document.getElementById('strength-bar-fill');

    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let strength = 0;
      if (val.length >= 6)            strength++;
      if (/[A-Z]/.test(val))          strength++;
      if (/[0-9]/.test(val))          strength++;
      if (/[^A-Za-z0-9]/.test(val))   strength++;

      const widths = ['0%', '25%', '50%', '75%', '100%'];
      const colors = ['#ff6b6b', '#ff884d', '#ffcc00', '#4CAF50'];
      strengthBarFill.style.width      = widths[strength];
      strengthBarFill.style.background = colors[Math.max(0, strength - 1)] || '';
    });

    // ─── Init ──────────────────────────────────────────────────────────────────
    showStep(currentStep);
  </script>
</body>
</html>
